  function sbHeaders(extra){
    var h={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+(_sbSession?_sbSession.access_token:SB_KEY)};
    return Object.assign(h,extra||{});
  }
  async function sbFetch(path,opts){
    try{
      var o=opts||{};
      var headers=Object.assign(sbHeaders(),o.headers||{});
      var fetchOpts=Object.assign({},o,{headers:headers});
      // 15-second timeout to prevent infinite loading
      var controller=typeof AbortController!=="undefined"?new AbortController():null;
      var timer=null;
      if(controller){
        fetchOpts.signal=controller.signal;
        timer=setTimeout(function(){controller.abort();},15000);
      }
      var r;
      try{
        r=await fetch(SB_URL+path,fetchOpts);
      }finally{
        if(timer)clearTimeout(timer);
      }
      if(r.status===401&&_sbSession&&_sbSession.refresh_token){
        var refreshed=await sbRefreshSession(_sbSession.refresh_token);
        if(refreshed){
          headers=Object.assign(sbHeaders(),o.headers||{});
          fetchOpts=Object.assign({},o,{headers:headers});
          r=await fetch(SB_URL+path,fetchOpts);
        } else {
          sbSignOut();
          S.authScreen="login";render();
          throw new Error("Сессия истекла. Войдите снова.");
        }
      }
      if(r.status===204)return null;
      var j=await r.json();
      if(!r.ok)throw new Error(j.error_description||j.message||JSON.stringify(j));
      return j;
    }catch(e){console.error('SB:',path,e);throw e;}
  }
  async function sbAuthFetch(path,opts){
    var r=await fetch(SB_URL+path,Object.assign({headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+(_sbSession?_sbSession.access_token:SB_KEY)}},opts||{}));
    var j=await r.json();
    if(!r.ok)throw new Error(j.error_description||j.msg||j.message||JSON.stringify(j));
    return j;
  }

  async function sbSignIn(email,pass){
    var j=await sbAuthFetch('/auth/v1/token?grant_type=password',{method:'POST',body:JSON.stringify({email,password:pass})});
    _sbSession={access_token:j.access_token,refresh_token:j.refresh_token,user:j.user};
    lsSet('esep_session',_sbSession);
    return j;
  }
  async function sbRefreshSession(refreshToken){
    try{
      var j=await sbAuthFetch('/auth/v1/token?grant_type=refresh_token',{method:'POST',body:JSON.stringify({refresh_token:refreshToken})});
      _sbSession={access_token:j.access_token,refresh_token:j.refresh_token,user:j.user};
      lsSet("esep_session",_sbSession);
      return true;
    }catch(e){return false;}
  }
  function sbSignOut(){_sbSession=null;_venueId=null;_venues=[];lsDel('esep_session');lsDel('esep_venue');}

  function lsGet(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
  function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
  function lsDel(k){try{localStorage.removeItem(k);}catch(e){}}

  async function sbLoadVenues(){

    return _venues;
  }
  async function sbCreateVenue(name){
    var rows=await sbFetch('/rest/v1/venues?select=id,name',{method:'POST',headers:{'Prefer':'return=representation'},body:JSON.stringify({owner_id:_sbSession.user.id,name:name})});
    return Array.isArray(rows)?rows[0]:rows;
  }

  async function sbKvGet(key,def){
    try{
      var rows=await sbFetch('/rest/v1/kv_store?select=value&venue_id=eq.'+_venueId+'&key=eq.'+encodeURIComponent(key));
      if(rows&&rows.length)return JSON.parse(rows[0].value);
      return def;
    }catch(e){return def;}
  }
  async function sbKvSet(key,val){
    try{
      await sbFetch('/rest/v1/kv_store?on_conflict=venue_id,key',{
        method:'POST',
        headers:{'Prefer':'resolution=merge-duplicates'},
        body:JSON.stringify({venue_id:_venueId,key:key,value:JSON.stringify(val),updated_at:new Date().toISOString()})
      });
    }catch(e){console.warn('kvSet err',key,e);}
  }
  async function sbKvGetAll(keys){
    try{
      var ks=keys.map(function(k){return '"'+k+'"';}).join(',');
      var rows=await sbFetch('/rest/v1/kv_store?select=key,value&venue_id=eq.'+_venueId+'&key=in.('+ks+')');
      var m={};
      (Array.isArray(rows)?rows:[]).forEach(function(r){try{m[r.key]=JSON.parse(r.value);}catch(e){m[r.key]=r.value;}});
      return m;
    }catch(e){return {};}
  }

  async function loadCashAllMonths(){
    if(!_venueId)return {};
    try{
      var now=new Date();
      var from=new Date(now.getFullYear()-3,0,1).toISOString().slice(0,10);
      var rows=await sbFetch('/rest/v1/cash_days?select=date,data&venue_id=eq.'+_venueId+'&date=gte.'+from+'&order=date.asc');
      var cash={};
      (Array.isArray(rows)?rows:[]).forEach(function(r){cash[r.date]=r.data;});
      return cash;
    }catch(e){console.warn('loadCash err',e);return {};}
  }


  var fmt=function(n){return new Intl.NumberFormat('ru-KZ',{maximumFractionDigits:0}).format(+n||0);};
  var toDay=function(){var d=new Date();return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());};
  var curYM=function(){return toDay().slice(0,7);};
  var pad2=function(n){return String(n).padStart(2,"0");};
  var dimOf=function(ym){if(ym.slice(5)==="00")return 365;var p=ym.split("-").map(Number);return new Date(p[0],p[1],0).getDate();};
  var MN=["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
  var MNS=["Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"];

  var F0=[{id:1,name:"Аренда",amount:0,day:1},{id:2,name:"Зарплата",amount:0,day:20},{id:3,name:"Коммуналка",amount:0,day:10},{id:4,name:"Бухгалтерия",amount:0,day:5},{id:5,name:"Интернет",amount:0,day:15}];
  var P0=[{id:1,name:"Наличные",color:"#22c55e",acquiring:0,aggregator:0,cashType:"cash"},{id:2,name:"Переводы",color:"#3b82f6",acquiring:0,aggregator:0,cashType:"cash"},{id:3,name:"KaspiPay",color:"#ef4444",acquiring:0.95,aggregator:0,cashType:"card"},{id:4,name:"HalykPay",color:"#f59e0b",acquiring:0.95,aggregator:0,cashType:"card"}];
  var EG0={
    "Себестоимость":{type:"cogs",cats:["Говядина/Баранина","Овощи","Специи","Морепродукты","Рыба","Прочие продукты"]},
    "Операционные":{type:"opex",cats:["Аренда","ЗП повара","ЗП официанты","Коммуналка","Упаковка","Реклама","Налоги KaspiPay","Налоги HalykPay"]},
    "Прочее":{type:"other",cats:["Непредвиденные","Другие"]}
  };

  var TYPE_LABELS={cogs:"Себестоимость",opex:"Операционные",other:"Прочие"};
  var TYPE_COLORS={cogs:"#fb923c",opex:"#ef4444",other:"#64748b"};
  // Legacy payment keys — used only for backward-compat reading old cash data
  var LEGACY_KEY_MAP={"Наличные":"Cash","Переводы":"Card","KaspiPay":"Kaspi","HalykPay":"Halyk"};
  function getPayKey(pm){return LEGACY_KEY_MAP[pm.name]||("P"+pm.id);}
  function getAllKeys(){var keys=[];(S.pays||[]).forEach(function(pm){var k=getPayKey(pm);keys.push("hall"+k,"del"+k);});return keys;}

  var HOME_CARDS_DEF=[
    {id:"rev",label:"Общая выручка",color:"#38bdf8"},
    {id:"gross",label:"Вал. прибыль",color:"#4ade80"},
    {id:"net",label:"Чистая прибыль",color:"#4ade80"},
    {id:"checks",label:"Кол-во чеков",color:"#38bdf8"},
    {id:"revday",label:"Выручка/день",color:"#38bdf8"},
    {id:"checkday",label:"Чеков/день",color:"#818cf8"},

  ];
  var HOME_CHARTS_DEF=[
    {id:"payments",label:"Ближайшие платежи"},

    {id:"breakeven",label:"ТБУ и цели"},
    {id:"health",label:"Здоровье ресторана"},
  ];

  var S={
    authScreen:"login",
    authEmail:"",authPass:"",authName:"",authLicCode:"",authErr:"",authLoading:false,
    authForgotSent:false,
    venueList:[],venueDropOpen:false,

    fixed:null,pays:null,cash:{},dds:[],cal:[],eg:null,
    trash:[],
    homeYm:curYM(),

    expYm:curYM(),expAdd:false,expNd:{group:"",cat:"",amount:0,note:"",date:toDay()},expOG:{},expEG:false,expShowF:true,expOpenPL:true,expOpenIncome:true,expTO:false,
    cfgImportStatus:"",cfgImportOk:false,venueSaved:false,venueOpen:false,

    targetsSaved:false,

  };
  var HOME_CARDS_DEFAULT=["rev","checks","net","metrics"];
  var HOME_CHARTS_DEFAULT=["days","breakeven","health","weekdays"];

  function set(patch){Object.assign(S,patch);render();}
  function save(k,v){sbKvSet(k,v);}

  function migrateEG(eg){
    if(!eg)return null;
    var _egVals=Object.values(eg);
    if(!_egVals.length)return eg;
    if(typeof _egVals[0]==="object"&&!Array.isArray(_egVals[0]))return eg;
    var n={};
    Object.entries(eg).forEach(function(x){
      var gname=x[0],cats=x[1];
      var type="other";
      if(gname==="Себестоимость")type="cogs";
      else if(gname==="Операционные")type="opex";
      n[gname]={type:type,cats:cats};
    });
    return n;
  }

  function egCats(eg,g){
    var gd=eg[g];
    if(!gd)return[];
    if(Array.isArray(gd))return gd;
    return gd.cats||[];
  }
  function egType(eg,g){
    var gd=eg[g];
    if(!gd)return"other";
    if(typeof gd==="object"&&!Array.isArray(gd))return gd.type||"other";
    return"other";
  }

  // ── SIMPLIFIED CASH: get day total from dayTotal field or legacy keys ──
  function getDayTotal(r){
    if(!r)return 0;
    // New simplified: dayTotal field
    if(r.dayTotal!=null&&r.dayTotal>0)return +r.dayTotal||0;
    // Legacy: sum all payment keys
    return getAllKeys().reduce(function(s,k){return s+(+r[k]||0);},0);
  }

  function getCashMonth(ym){
    var dim=dimOf(ym);
    var total=0,checks=0;
    for(var d=1;d<=dim;d++){
      var ds=ym+"-"+pad2(d),r=S.cash[ds]||{};
      total+=getDayTotal(r);
      checks+=(+r.checksCount||0);
    }
    // For compatibility with analytics - return simple totals
    // Legacy by-payment breakdown (zeros in simplified mode)
    var by={};
    (S.pays||[]).forEach(function(pm){by[pm.name]=0;});
    // Put everything in "Наличные" bucket for analytics display
    if(total>0)by["Наличные"]=total;
    return{
      total:total,
      by:by,
      nal:total,perev:0,card:0,
      ect:0,edt:0,salt:0,
      ecItems:[],edItems:[],salItems:[],
      checks:checks
    };
  }

  // ── P&L CALCULATION ───────────────────────────────────────────────────
  function calcPL(ym){
    if(ym.slice(5)==="00"){
      var yr=ym.slice(0,4);
      var agg=null;
      for(var mi=1;mi<=12;mi++){
        var mym=yr+"-"+pad2(mi);
        var mp=calcPL(mym);
        if(!agg){agg=JSON.parse(JSON.stringify(mp));}
        else{
          var numKeys=['total','cost','opex','other','totExp','cashExp','fixedT','gross','net','checks','fotExp','rentExp','utilExp','mktExp','commissions','opProfit','opexOther'];
          numKeys.forEach(function(k){agg[k]=(agg[k]||0)+(mp[k]||0);});
          agg.ci.total+=mp.ci.total;agg.ci.ect+=mp.ci.ect;agg.ci.edt+=mp.ci.edt;
          Object.keys(mp.ci.by).forEach(function(k){agg.ci.by[k]=(agg.ci.by[k]||0)+mp.ci.by[k];});
          agg.am.acq+=mp.am.acq;agg.am.agg+=mp.am.agg;
          Object.keys(mp.opexByCat||{}).forEach(function(k){agg.opexByCat[k]=(agg.opexByCat[k]||0)+(mp.opexByCat[k]||0);});
        }
      }
      if(!agg)return calcPL(yr+"-01");
      var dim=365;
      agg.fc=agg.total>0?(agg.cost/agg.total*100):0;
      agg.avgCheck=agg.checks>0?agg.total/agg.checks:0;
      agg.fotPct=agg.total>0?(agg.fotExp/agg.total*100):0;
      agg.revDay=agg.total/dim;agg.checksDay=agg.checks/dim;
      return agg;
    }
    var ci=getCashMonth(ym),am=getAcqMonth(ym);
    var eg=S.eg||EG0;
    var mExp=S.dds.filter(function(e){return e.ym===ym;});
    var cost=mExp.filter(function(e){return egType(eg,e.group)==="cogs";}).reduce(function(s,e){return s+(e.amount||0);},0);
    var opex=mExp.filter(function(e){return egType(eg,e.group)==="opex";}).reduce(function(s,e){return s+(e.amount||0);},0);
    var other=mExp.filter(function(e){return egType(eg,e.group)==="other";}).reduce(function(s,e){return s+(e.amount||0);},0);
    var totExp=mExp.reduce(function(s,e){return s+(e.amount||0);},0);
    var dim=dimOf(ym),isCur=ym===curYM(),todayD=new Date().getDate();
    var fixedT=(S.fixed||[]).filter(function(e){if(!e.amount||e.amount<=0)return false;var d=Math.min(e.day||1,dim);return!isCur||d<=todayD;}).reduce(function(s,e){return s+(e.amount||0);},0);
    var gross=ci.total-cost;
    var net=gross-opex-other;
    var fc=ci.total>0?(cost/ci.total*100):0;
    var checks=ci.checks||0;  // from getCashMonth, no double loop needed
    var avgCheck=checks>0?ci.total/checks:0;
    var FOT_CATS=["ЗП повара","ЗП официанты","Зарплата","ФОТ"];
    var RENT_CATS=["Аренда"];
    var UTIL_CATS=["Коммуналка"];
    var MKT_CATS=["Реклама","Маркетинг"];

  // ── SVG BAR CHART ────────────────────────────────────────────────────────
  function svgBarChart(bars, color, hlColor, valFmt){
    if(!bars||!bars.length)return'';
    var maxV=Math.max.apply(null,bars.map(function(b){return b.val||0;}));
    if(maxV<=0)return'';
    var H=72, LBL=14, VVAL=12, PAD=2;
    var totalH=H+LBL+VVAL+PAD;
    var n=bars.length;
    var gap=2;
    var vbW=n*18;
    var barW=18-gap;
    var parts=['<svg class="bar-svg" viewBox="0 0 '+vbW+' '+totalH+'" style="width:100%;height:'+(totalH)+'px;display:block;overflow:visible">'];
    bars.forEach(function(b,i){
      var v=b.val||0;
      var pct=maxV>0?v/maxV:0;
      var bh=Math.max(pct*H, v>0?3:0);
      var x=i*18;
      var col=b.isHighlight?(hlColor||'#6366f1'):(color||'#38bdf8');
      var y=VVAL+PAD+(H-bh);
      if(v>0){
        var lbl=valFmt?valFmt(v):''+v;
        parts.push('<text x="'+(x+barW/2)+'" y="'+(y-2)+'" text-anchor="middle" font-size="7" fill="'+col+'" opacity="0.9">'+lbl+'</text>');
      }
      parts.push('<rect x="'+x+'" y="'+y+'" width="'+barW+'" height="'+bh+'" rx="2" fill="'+col+'" opacity="0.22"/>');
      if(bh>2)parts.push('<rect x="'+x+'" y="'+y+'" width="'+barW+'" height="2" rx="1" fill="'+col+'"/>');
      parts.push('<text x="'+(x+barW/2)+'" y="'+(VVAL+PAD+H+LBL-1)+'" text-anchor="middle" font-size="8" fill="'+(b.isHighlight?col:'#64748b')+'" font-weight="'+(b.isHighlight?700:400)+'">'+b.label+'</text>');
    });
    parts.push('</svg>');
    return parts.join('');
  }

  function _doRender(){
    var app=document.getElementById("app");
    if(S.authScreen!=="app"){
      app.innerHTML=renderAuth();
      bindAuthEvents();
      return;
    }
    if(!S.fixed){
      // Safety: if stuck loading for > 12s, show error with logout option
      if(!_loadingStart)_loadingStart=Date.now();
      var stuck=Date.now()-_loadingStart>12000;
      if(!stuck&&!_loadingTimer){
        _loadingTimer=setTimeout(function(){_loadingTimer=null;if(!S.fixed)render();},12500);
      }

  // ── AUTH EVENT BINDING ────────────────────────────────────────────────
  function bindAuthEvents(){
    var app=document.getElementById("app");
    function bindInput(sel,key){var el=app.querySelector(sel);if(el)el.addEventListener("input",function(){S[key]=el.value;});}
    bindInput("[data-auth-email]","authEmail");
    bindInput("[data-auth-pass]","authPass");
    bindInput("[data-auth-name]","authName");
    bindInput("[data-auth-liccode]","authLicCode");

    var licEl=app.querySelector("[data-auth-liccode]");
    if(licEl)licEl.addEventListener("input",function(){this.value=this.value.toUpperCase();S.authLicCode=this.value;});

    app.querySelectorAll("[data-auth-goto]").forEach(function(el){
      el.addEventListener("click",function(){set({authScreen:el.getAttribute("data-auth-goto"),authErr:"",authForgotSent:false});});
    });

    var submitEl=app.querySelector("[data-auth-submit]");
    if(submitEl)submitEl.addEventListener("click",async function(){
      if(S.authLoading)return;
      var email=(S.authEmail||"").trim().toLowerCase();
      var pass=S.authPass||"";
      if(!email||!pass){set({authErr:"Введите email и пароль"});return;}
      set({authLoading:true,authErr:""});
      try{
        await sbSignIn(email,pass);
        await loadAppVenues();
      }catch(e){
        var msg=e.message||"Ошибка входа";
        if(msg.indexOf("Invalid login")>=0||msg.indexOf("invalid_grant")>=0)msg="Неверный email или пароль";
        set({authLoading:false,authErr:msg});
      }
    });

    var ownerSubmit=app.querySelector("[data-auth-submit-owner]");
    if(ownerSubmit)ownerSubmit.addEventListener("click",async function(){
      if(S.authLoading)return;
      var licCode=(S.authLicCode||"").trim().toUpperCase();
      var name=(S.authName||"").trim();
      var email=(S.authEmail||"").trim().toLowerCase();
      var pass=S.authPass||"";
      if(!licCode){set({authErr:"Введите лицензионный код"});return;}
      if(!name){set({authErr:"Введите ваше имя"});return;}
      if(!email||!pass){set({authErr:"Введите email и пароль"});return;}
      if(pass.length<6){set({authErr:"Пароль минимум 6 символов"});return;}
      set({authLoading:true,authErr:""});
      try{
        var licRes=await fetch(SB_URL+"/rest/v1/"+AN_LICENSES_TABLE+"?code=eq."+encodeURIComponent(licCode)+"&select=id,code,is_used&limit=1",
          {headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}});
        var licRows=await licRes.json();
        if(!licRows||!licRows.length)throw new Error("Лицензионный код не найден. Обратитесь к разработчику.");
        if(licRows[0].is_used)throw new Error("Этот код уже использован. Обратитесь к разработчику.");
        var licId=licRows[0].id;
        var signupData=await sbAuthFetch("/auth/v1/signup",{method:"POST",body:JSON.stringify({email:email,password:pass,data:{name:name}})});
        if(!signupData.access_token)throw new Error("Ошибка регистрации. Попробуйте ещё раз.");
        _sbSession={access_token:signupData.access_token,refresh_token:signupData.refresh_token,user:signupData.user};
        lsSet("esep_session",_sbSession);
        await fetch(SB_URL+"/rest/v1/"+AN_LICENSES_TABLE+"?id=eq."+encodeURIComponent(licId),{
          method:"PATCH",
          headers:{"apikey":SB_KEY,"Authorization":"Bearer "+signupData.access_token,"Content-Type":"application/json","Prefer":"return=minimal"},
          body:JSON.stringify({is_used:true,used_at:new Date().toISOString(),used_by:email,used_by_name:name})
        });
        await fetch(SB_URL+"/rest/v1/"+AN_PROFILES_TABLE,{
          method:"POST",
          headers:{"apikey":SB_KEY,"Authorization":"Bearer "+signupData.access_token,"Content-Type":"application/json","Prefer":"return=minimal"},
          body:JSON.stringify({id:signupData.user.id,email:email,name:name,role:"owner",created_at:new Date().toISOString()})
        });
        await loadAppVenues();
      }catch(e){
        set({authLoading:false,authErr:e.message||"Ошибка регистрации"});
      }
    });

    app.querySelectorAll("[data-pick-venue]").forEach(function(el){
      el.addEventListener("click",async function(){await switchVenue(el.getAttribute("data-pick-venue"));});
    });

    var nvnEl=app.querySelector("[data-new-venue-name]");
    if(nvnEl)nvnEl.addEventListener("input",function(){S.newVenueName=nvnEl.value;});
    var cvEl=app.querySelector("[data-create-venue]");
    if(cvEl)cvEl.addEventListener("click",async function(){
      var name=(S.newVenueName||"").trim();
      if(!name){set({authErr:"Введите название"});return;}
      try{
        var v=await sbCreateVenue(name);
        _venues=await sbLoadVenues();
        S.venueList=_venues;S.newVenueName="";
        await switchVenue(v.id);
      }catch(e){set({authErr:e.message||"Ошибка создания"});}
    });

    var logoutEl=app.querySelector("[data-auth-logout]");
    if(logoutEl)logoutEl.addEventListener("click",function(){
      sbSignOut();
      S.authScreen="login";S.authEmail="";S.authPass="";S.authErr="";S.authName="";S.authLicCode="";
      S.venueList=[];S.venueDropOpen=false;render();
    });

    var forgotBtn=app.querySelector("[data-forgot-submit]");
    if(forgotBtn){
      forgotBtn.addEventListener("click",async function(){
        if(S.authLoading)return;
        var email=(S.authEmail||"").trim().toLowerCase();
        if(!email||email.indexOf("@")<0){set({authErr:"Введите корректный email"});return;}
        set({authLoading:true,authErr:""});
        try{
          await sbAuthFetch("/auth/v1/recover",{method:"POST",body:JSON.stringify({email:email})});
          set({authLoading:false,authForgotSent:true,authErr:""});
        }catch(e){set({authLoading:false,authErr:"Ошибка: "+(e.message||"попробуйте ещё раз")});}
      });
    }

    var passEl=app.querySelector("[data-auth-pass]");
    var emailEl=app.querySelector("[data-auth-email]");
    if(emailEl&&passEl)emailEl.addEventListener("keydown",function(e){if(e.key==="Enter")passEl.focus();});
    if(passEl)passEl.addEventListener("keydown",function(e){
      if(e.key==="Enter"){var sub=app.querySelector("[data-auth-submit]")||app.querySelector("[data-auth-submit-owner]");if(sub)sub.click();}
    });
  }

  function _showToast(msg,type){
    var existing=document.getElementById('_toast_el');if(existing)existing.remove();
    var t=document.createElement('div');t.id='_toast_el';
    var ok=type!=='err';
    t.style.cssText='position:fixed;bottom:calc(20px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:10px;font-size:12px;font-weight:600;z-index:9999;white-space:nowrap;pointer-events:none;backdrop-filter:blur(12px);background:'+(ok?'rgba(74,222,128,.1)':'rgba(239,68,68,.1)')+';border:1px solid '+(ok?'rgba(74,222,128,.25)':'rgba(239,68,68,.25)')+';color:'+(ok?'#4ade80':'#ef4444');
    t.textContent=msg;document.body.appendChild(t);
    setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},2800);
  }

  async function _ensureOwnerProfile(){
    try{
      var uid=_sbSession&&_sbSession.user?_sbSession.user.id:null;
      if(!uid)return;
      var tok=_sbSession.access_token||SB_KEY;
      var r=await fetch(SB_URL+'/rest/v1/'+AN_PROFILES_TABLE+'?id=eq.'+uid+'&select=id,invite_code&limit=1',
        {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+tok}});
      var rows=await r.json();
      if(rows&&Array.isArray(rows)&&rows.length>0)return;
      var userEmail=(_sbSession.user.email||'').toLowerCase();
      var userName=(_sbSession.user.user_metadata&&_sbSession.user.user_metadata.name)||userEmail;
      await fetch(SB_URL+'/rest/v1/'+AN_PROFILES_TABLE,{
        method:'POST',
        headers:{'apikey':SB_KEY,'Authorization':'Bearer '+tok,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
        body:JSON.stringify({id:uid,email:userEmail,name:userName,role:'owner',created_at:new Date().toISOString()})
      });
    }catch(e){console.warn('[ESEP] _ensureOwnerProfile err:',e.message||e);}
  }

  async function loadAppVenues(){
    try{
      _venues=await sbLoadVenues();
      S.venueList=_venues;
      S.authLoading=false;
      if(!_venues.length){set({authScreen:"venues",authLoading:false,authErr:""});return;}
      var savedVenueId=lsGet("esep_venue");
      var found=_venues.find(function(v){return v.id===savedVenueId;});
      if(found){await switchVenue(found.id);}
      else if(_venues.length===1){await switchVenue(_venues[0].id);}
      else{set({authScreen:"venues",authLoading:false,venueList:_venues,authErr:""});}
    }catch(e){
      set({authLoading:false,authErr:"Ошибка загрузки: "+(e.message||e)});
    }
  }

  async function switchVenue(vid){
    _venueId=vid;
    lsSet("esep_venue",vid);
    S.venueDropOpen=false;S.authScreen="app";S.authLoading=false;
    S.fixed=null;S.pays=null;S.cash={};S.dds=[];S.cal=[];S.eg=null;
    S.tab="home";render();
    await loadVenueData();
  }

  async function loadVenueData(){
    try{
      var keys=["bj_fixed","bj_pays","bj_dds3","bj_cal","bj_home_cards","bj_home_charts","bj_venue","bj_targets","bj_trash","bj_expgroups"];
      var kvMap=await sbKvGetAll(keys);
      var hasData=kvMap["bj_pays"]||kvMap["bj_dds3"]||kvMap["bj_venue"];
      if(!hasData){
        S.pays=P0.map(function(p){return Object.assign({},p);});
        S.fixed=F0.map(function(f){return Object.assign({},f);});
        S.eg=JSON.parse(JSON.stringify(EG0));
        S.venue={name:"",address:"",phone:"",bin:"",owner:"",email:""};
        S.homeCards=HOME_CARDS_DEFAULT.slice();S.homeCharts=HOME_CHARTS_DEFAULT.slice();
        S.cash={};S.dds=[];S.cal=[];S.targets={};S.trash=[];
        save("bj_pays",S.pays);save("bj_fixed",S.fixed);save("bj_expgroups",S.eg);
        render();return;
      }
      var rawEg=kvMap["bj_expgroups"]||null;
      S.eg=migrateEG(rawEg)||EG0;
      S.fixed=kvMap["bj_fixed"]||F0;
      S.pays=kvMap["bj_pays"]||P0;
      S.dds=kvMap["bj_dds3"]||[];
      S.cal=kvMap["bj_cal"]||[];
      var vdata=_venues.find(function(v){return v.id===_venueId;})||{};
      var kvVenue=kvMap["bj_venue"]||{};
      S.venue={name:kvVenue.name||vdata.name||"",address:kvVenue.address||vdata.address||"",phone:kvVenue.phone||"",bin:kvVenue.bin||"",owner:kvVenue.owner||"",email:kvVenue.email||""};
      if(kvMap["bj_targets"]){S.targets=kvMap["bj_targets"];Object.keys(S.targets).forEach(function(k){if(S.targets[k])delete S.targets[k].net;});}
      if(kvMap["bj_trash"]&&kvMap["bj_trash"].length)S.trash=kvMap["bj_trash"];
      var validCardIds=HOME_CARDS_DEF.map(function(x){return x.id;});
      if(kvMap["bj_home_cards"])S.homeCards=kvMap["bj_home_cards"].filter(function(id){return validCardIds.indexOf(id)>=0;});
      if(kvMap["bj_home_charts"])S.homeCharts=kvMap["bj_home_charts"].filter(function(id){return HOME_CHARTS_DEF.map(function(x){return x.id;}).indexOf(id)>=0;});
      var cashData=await loadCashAllMonths();
      S.cash=normalizeCash(cashData);
      save("bj_pays",S.pays);
      render();
      setTimeout(checkUpcomingPayments,800);
      setTimeout(_autoBackupIfNeeded,3000);
      setTimeout(_ensureOwnerProfile,1500);
    }catch(e){
      console.error("loadVenueData error",e);
      // Always set S.fixed so the spinner doesn't loop forever
      if(!S.fixed)S.fixed=F0;
      if(!S.pays)S.pays=P0.map(function(p){return Object.assign({},p);});
      if(!S.eg)S.eg=JSON.parse(JSON.stringify(EG0));
      _showToast("Ошибка загрузки: "+(e.message||e),"err");
      render();
    }
  }

  // ── EVENT BINDING ─────────────────────────────────────────────────────
  function bindEvents(){
    var root=document.getElementById("app");

    root.querySelectorAll("input").forEach(function(el){
      el.addEventListener("keydown",function(e){if(e.key==="Enter")el.blur();});
    });

    root.querySelectorAll("[data-mp]").forEach(function(el){
      el.addEventListener("change",function(){
        var id=el.getAttribute("data-mp"),type=el.getAttribute("data-mpt");
        var ymKey={home:"homeYm",cal:"calYm",exp:"expYm"}[id];
        if(!ymKey)return;
        var cur=S[ymKey];
        var curYr=+cur.slice(0,4);
        var curMo=(cur.length===7&&cur.slice(5)==="00")?-1:+cur.slice(5,7)-1;
        if(type==="y") curYr=+el.value; else curMo=+el.value;
        var nv=curMo===-1?(curYr+"-00"):(curYr+"-"+pad2(curMo+1));
        var patch={};patch[ymKey]=nv;
        if(id==="cal")patch.calSel=null;
        set(patch);
      });
    });

    root.querySelectorAll("[data-tab]").forEach(function(el){
      el.addEventListener("click",function(){set({tab:el.getAttribute("data-tab")});});
    });

    root.querySelectorAll("[data-toggle]").forEach(function(el){
      el.addEventListener("click",function(){var k=el.getAttribute("data-toggle");var patch={};patch[k]=!S[k];set(patch);});
    });

    root.querySelectorAll("[data-pick-venue]").forEach(function(el){
      el.addEventListener("click",async function(){await switchVenue(el.getAttribute("data-pick-venue"));});
    });
    var nvnEl2=root.querySelector("[data-new-venue-name]");
    if(nvnEl2)nvnEl2.addEventListener("input",function(){S.newVenueName=nvnEl2.value;});
    var cvEl2=root.querySelector("[data-create-venue]");
    if(cvEl2)cvEl2.addEventListener("click",async function(){
      var name=(S.newVenueName||"").trim();if(!name)return;
      try{var v=await sbCreateVenue(name);_venues=await sbLoadVenues();S.venueList=_venues;S.newVenueName="";await switchVenue(v.id);}catch(e){console.error(e);}
    });
    var logoutEl2=root.querySelector("[data-auth-logout]");
    if(logoutEl2)logoutEl2.addEventListener("click",function(){
      sbSignOut();S.fixed=null;S.pays=null;S.cash={};S.dds=[];S.cal=[];S.eg=null;
      S.trash=[];S.targets={};S.venueList=[];_venues=[];
      set({authScreen:"login",authEmail:"",authPass:"",authErr:"",venueDropOpen:false,tab:"home"});
    });

    root.querySelectorAll("[data-toggle-card]").forEach(function(el){
      el.addEventListener("click",function(){
        var id=el.getAttribute("data-toggle-card");
        var cards=(S.homeCards||HOME_CARDS_DEFAULT).slice();

      });

      el.addEventListener("click",function(){

        var idx=charts.indexOf(id);if(idx>=0)charts.splice(idx,1);else charts.push(id);

      });

    root.querySelectorAll("[data-card-click]").forEach(function(el){
      el.addEventListener("click",function(){if(el.getAttribute("data-card-click")==="rev")set({tab:"cash"});});
    });

    // ── SIMPLIFIED CASH EVENTS ────────────────────────────────────────
    var cashDateEl=root.querySelector("[data-cash-date]");
    if(cashDateEl)cashDateEl.addEventListener("change",function(){set({cashDate:cashDateEl.value,cashSaved:false});});

    var cashPrevBtn=root.querySelector("[data-cash-prev]");
    if(cashPrevBtn)cashPrevBtn.addEventListener("click",function(){
      var d=new Date(S.cashDate+'T00:00:00');d.setDate(d.getDate()-1);
      set({cashDate:d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()),cashSaved:false});

    var cashTotalEl=root.querySelector("[data-cash-total]");

      cashTotalEl.addEventListener("input",function(){
        var current=Object.assign({},S.cash[S.cashDate]||{});
        current.dayTotal=+cashTotalEl.value||0;

  // ── BACKUP / AUTOBACKUP ───────────────────────────────────────────────
  var BACKUP_LS_KEY="esep_auto_backup";
  var BACKUP_DATE_KEY="esep_auto_backup_date";
  var BACKUP_INTERVAL_MS=7*24*60*60*1000;
  function _autoBackupIfNeeded(){
    if(!S.fixed||!_venueId)return;
    try{
      var last=+(localStorage.getItem(BACKUP_DATE_KEY)||0);
      if(Date.now()-last<BACKUP_INTERVAL_MS)return;
      var data={_version:9,_auto:true,_date:new Date().toISOString(),bj_fixed:S.fixed,bj_pays:S.pays,bj_cash:S.cash,bj_dds3:S.dds,bj_cal:S.cal,bj_expgroups:S.eg,bj_venue:S.venue,bj_targets:S.targets,bj_trash:S.trash};
      var json=JSON.stringify(data);
      if(json.length>4*1024*1024){data.bj_cash={};json=JSON.stringify(data);}
      localStorage.setItem(BACKUP_LS_KEY,json);localStorage.setItem(BACKUP_DATE_KEY,String(Date.now()));
    }catch(e){}
  }

  function normalizeCash(cash){
    if(!cash||typeof cash!=="object")return{};
    var out={};
    Object.keys(cash).forEach(function(date){
      var r=cash[date];
      if(!r||typeof r!=="object"){out[date]=r;return;}
      var nr=Object.assign({},r);
      if(nr.dayTotal!=null)nr.dayTotal=+nr.dayTotal||0;
      if(nr.checksCount!=null)nr.checksCount=+nr.checksCount||0;
      if(Array.isArray(nr.expCash))nr.expCash=nr.expCash.map(function(e){return Object.assign({},e,{amount:+e.amount||0});});
      if(Array.isArray(nr.expCard))nr.expCard=nr.expCard.map(function(e){return Object.assign({},e,{amount:+e.amount||0});});
      out[date]=nr;
    });
    return out;
  }

  // Superadmin license management
  function _genLicCode(){var chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';var part=function(){var s='';for(var i=0;i<4;i++)s+=chars[Math.floor(Math.random()*chars.length)];return s;};return part()+'-'+part();}
  function _fallbackCopy2(text){var ta=document.createElement("textarea");ta.value=text;ta.style.cssText="position:fixed;top:-9999px;left:-9999px";document.body.appendChild(ta);ta.select();try{document.execCommand("copy");}catch(e){}document.body.removeChild(ta);}

  window._loadLicenses=async function(){
    if(!isSuperAdmin())return;
    var el=document.getElementById('licenses-list');if(!el)return;
    el.innerHTML='<div style="font-size:11px;color:#475569;text-align:center;padding:8px">Загрузка...</div>';
    try{
      var r=await fetch(SB_URL+'/rest/v1/'+AN_LICENSES_TABLE+'?order=created_at.desc&limit=50',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+(_sbSession&&_sbSession.access_token?_sbSession.access_token:SB_KEY)}});
      var rows=await r.json();
      if(!rows||!rows.length){el.innerHTML='<div style="font-size:11px;color:#475569;text-align:center;padding:8px">Нет лицензий</div>';return;}
      el.innerHTML=rows.map(function(lic){
        var usedColor=lic.is_used?'#ef4444':'#4ade80';var usedLabel=lic.is_used?'Использован':'Активен';
        return '<div style="padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:8px">'
          +'<div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:13px;font-weight:800;font-family:monospace;color:#facc15;letter-spacing:.1em">'+esc(lic.code)+'</span><span style="font-size:9px;padding:1px 6px;border-radius:5px;background:rgba('+(lic.is_used?'239,68,68':'74,222,128')+',.1);color:'+usedColor+';font-weight:700">'+usedLabel+'</span></div>'
          +'<div style="font-size:10px;color:#64748b;margin-top:2px">'+(lic.note?'<span style="color:#94a3b8">'+esc(lic.note)+'</span> &middot; ':'')+lic.created_at.slice(0,10)+(lic.is_used&&lic.used_by_name?' &rarr; <span style="color:#ef4444">'+esc(lic.used_by_name)+'</span>':'')+'</div></div>'
          +(!lic.is_used?'<button data-lic-code="'+esc(lic.code)+'" onclick="window._copyLicCode(this.dataset.licCode)" style="flex-shrink:0;background:rgba(250,204,21,.1);border:1px solid rgba(250,204,21,.2);color:#facc15;border-radius:8px;padding:4px 8px;font-size:10px;cursor:pointer">Копировать</button>':'')
          +(!lic.is_used?'<button data-lic-id="'+esc(lic.id)+'" onclick="window._deleteLicense(this.dataset.licId)" style="flex-shrink:0;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444;border-radius:8px;padding:4px 8px;font-size:10px;cursor:pointer">×</button>':'')
          +'</div>';
      }).join('');
    }catch(e){if(el)el.innerHTML='<div style="font-size:11px;color:#ef4444;text-align:center;padding:8px">Ошибка загрузки</div>';}
  };
  window._copyLicCode=function(code){if(navigator.clipboard)navigator.clipboard.writeText(code).then(function(){_showToast('Код скопирован: '+code);});else{_fallbackCopy2(code);_showToast('Скопировано');}};
  window._deleteLicense=async function(id){
    if(!isSuperAdmin())return;if(!confirm('Удалить лицензию?'))return;
    try{await fetch(SB_URL+'/rest/v1/'+AN_LICENSES_TABLE+'?id=eq.'+encodeURIComponent(id),{method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+(_sbSession&&_sbSession.access_token?_sbSession.access_token:SB_KEY)}});_showToast('Лицензия удалена');window._loadLicenses();}catch(e){_showToast('Ошибка удаления','err');}
  };
  window._generateLicense=async function(){
    if(!isSuperAdmin())return;
    var note=prompt('Заметка для кода (имя клиента):','')||'';var code=_genLicCode();
    try{
      var r=await fetch(SB_URL+'/rest/v1/'+AN_LICENSES_TABLE,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+(_sbSession&&_sbSession.access_token?_sbSession.access_token:SB_KEY),'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(Object.assign({code:code,is_used:false,created_at:new Date().toISOString()},(note?{note:note}:{})))});
      if(!r.ok)throw new Error('Ошибка создания');
      _showToast('Код создан: '+code);window._loadLicenses();
      window._copyLicCode(code);
    }catch(e){_showToast(e.message||'Ошибка','err');}
  };

  function checkUpcomingPayments(){
    if(!window.Telegram||!window.Telegram.WebApp||!window.Telegram.WebApp.showAlert)return;
    var tomorrow=new Date();tomorrow.setDate(tomorrow.getDate()+1);var tomorrowDay=tomorrow.getDate();
    var ym=curYM();var dim=dimOf(ym);
    var due=(S.fixed||[]).filter(function(e){if(!e.amount||e.amount<=0)return false;return Math.min(e.day||1,dim)===tomorrowDay;});
    var dueCal=S.cal.filter(function(e){return e.ym===ym&&e.day===tomorrowDay&&e.amount>0;});
    var all=due.concat(dueCal);if(!all.length)return;
    var notifKey='bj_notif_'+ym+'_'+tomorrowDay;
    try{if(localStorage.getItem(notifKey))return;}catch(e){}
    var names=all.map(function(e){return(e.name||e.cat||'Платёж')+': '+fmt(e.amount||0)+' ₸';});
    window.Telegram.WebApp.showAlert('Завтра ('+tomorrowDay+' '+MNS[+ym.slice(5,7)-1]+') запланированы платежи: '+names.join(', '));
    try{localStorage.setItem(notifKey,'1');}catch(e){}
  }

        '  }).then(function(){return self.clients.claim();}));',

        'self.addEventListener("fetch",function(e){',
